<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Cut Boring Work</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Fraunces:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { background-color: var(--brand); }
    body { font-family: 'DM Sans', sans-serif; background: #fdfcf8; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 2rem; }
    h1 { font-family: 'Fraunces', serif; font-size: 4rem; color: #1b4d4a; margin-bottom: 12px; }
    p { font-size: 1.1rem; color: #6b6b6b; margin-bottom: 24px; }
    a { color: #1b4d4a; font-weight: 600; text-decoration: none; padding: 12px 28px; border: 2px solid #1b4d4a; border-radius: 10px; display: inline-block; transition: all 0.2s; }
    a:hover { background: #1b4d4a; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>This page doesn't exist. Maybe it never did.</p>
    <a href="/">Go Home</a>
  </div>
</body>
</html>
