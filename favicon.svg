  <path d="M27 30.5c0-4 3.5-6 6.5-5.5 2.2.4 3.5 2 3.5 4.5" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M27 30.5v1.5" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="30" cy="32" r="1" fill="#fff"/>
  <circle cx="34" cy="32" r="1" fill="#fff"/>
  <!-- Smile -->
  <path d="M30.5 34.5q1.5 1.5 3 0" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Sparkle -->
